<title>Memories 📸</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Quicksand&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Quicksand', sans-serif;
    background: #fff5f8;
    margin: 0;
    text-align: center;
}

/* NAVBAR */
.navbar {
    background: #ff4d88;
    padding: 30px;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.navbar a {
    font-family: 'Dancing Script', cursive;
    font-size: 24px;
    color: white;
    margin: 20px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s ease;
    display: inline-block;
}

/* NAVBAR HOVER GLOW */
.navbar a:hover {
    text-shadow: 0 0 10px #fff,
                 0 0 20px #ff99cc,
                 0 0 30px #ff4d88;
    transform: scale(1.1);
}

/* TITLE */
h1{
    font-family: 'Dancing Script', cursive;
    font-size: 45px;
    color: #ff4d88;
    margin: 30px 0;
}

/* GRID */
.memories-container{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 20px;
}

/* MEMORY CARD */
.memory{
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* COLLAGE */
.collage{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
}

.collage img{
    width: 100%;
    height: 450px;
    object-fit: cover;
    border-radius: 10px;
}

/* DATE */
.date{
    margin-top: 10px;
    font-weight: bold;
    color: #ff4d88;
    font-family: 'Quicksand', sans-serif;
}
</style>

</head>
